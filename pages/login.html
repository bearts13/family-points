<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录选择 - 家庭积分银行</title>
    <style id="theme-vars">
/* FamilyPoints - Brand CSS */
/* Core Concept: Growth Bank for kids */

:root {
  /* === Brand Colors === */
  --color-income: #2ECC71;
  --color-income-light: #A8E6CF;
  --color-income-dark: #27AE60;
  --color-expense: #FF6B6B;
  --color-expense-light: #FFB8B8;
  --color-expense-dark: #E55A5A;
  --color-background: #FFF9F0;
  --color-card: #FFFFFF;
  --color-cream: #FFEAA7;
  --color-sky: #74B9FF;
  --color-sky-light: #A8D8FF;
  --color-gold: #F9CA24;
  --color-gold-dark: #F0B90B;
  --color-text-primary: #2D3436;
  --color-text-secondary: #636E72;
  --color-text-muted: #B2BEC3;
  --color-border: #DFE6E9;
  --color-game-bg-start: #2D3436;
  --color-game-bg-end: #6C5CE7;
  --color-overlay: rgba(0, 0, 0, 0.4);

  /* === State Colors === */
  --state-success: #2ECC71;
  --state-warning: #FFEAA7;
  --state-error: #FF6B6B;
  --state-info: #74B9FF;

  /* === Typography === */
  --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  --font-size-xs: 12px;
  --font-size-sm: 14px;
  --font-size-base: 16px;
  --font-size-lg: 20px;
  --font-size-xl: 24px;
  --font-size-2xl: 32px;
  --font-size-3xl: 48px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-bold: 700;
  --font-weight-extra-bold: 800;
  --line-height-tight: 1.2;
  --line-height-normal: 1.5;

  /* === Spacing === */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* === Radius === */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* === Shadows === */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.12);

  /* === Touch Targets (child-friendly) === */
  --touch-min: 60px;
  --touch-min-height: 48px;

  /* === Layout === */
  --app-max-width: 800px;
  --header-height: 80px;
  --progress-bar-height: 60px;
  --tab-bar-height: 72px;
  --content-padding: 16px;
}

/* === Typography Classes === */
.text-xs { font-size: var(--font-size-xs); }
.text-sm { font-size: var(--font-size-sm); }
.text-base { font-size: var(--font-size-base); }
.text-lg { font-size: var(--font-size-lg); }
.text-xl { font-size: var(--font-size-xl); }
.text-2xl { font-size: var(--font-size-2xl); }
.text-3xl { font-size: var(--font-size-3xl); }

.font-normal { font-weight: var(--font-weight-normal); }
.font-medium { font-weight: var(--font-weight-medium); }
.font-bold { font-weight: var(--font-weight-bold); }
.font-extra-bold { font-weight: var(--font-weight-extra-bold); }

.text-primary { color: var(--color-text-primary); }
.text-secondary { color: var(--color-text-secondary); }
.text-muted { color: var(--color-text-muted); }
.text-income { color: var(--color-income); }
.text-expense { color: var(--color-expense); }
.text-gold { color: var(--color-gold-dark); }

/* === Utility Classes === */
.bg-background { background-color: var(--color-background); }
.bg-card { background-color: var(--color-card); }
.bg-income { background-color: var(--color-income); }
.bg-expense { background-color: var(--color-expense); }
.bg-cream { background-color: var(--color-cream); }
.bg-sky { background-color: var(--color-sky); }
.bg-gold { background-color: var(--color-gold); }

.rounded-sm { border-radius: var(--radius-sm); }
.rounded-md { border-radius: var(--radius-md); }
.rounded-lg { border-radius: var(--radius-lg); }
.rounded-xl { border-radius: var(--radius-xl); }
.rounded-full { border-radius: var(--radius-full); }

.shadow-card { box-shadow: var(--shadow-card); }
.shadow-card-hover { box-shadow: var(--shadow-card-hover); }
.shadow-float { box-shadow: var(--shadow-float); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-card: var(--color-card);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex flex-col items-center justify-center min-h-screen px-5 py-10" style="background-color: var(--color-background);">

      <!-- Top Area — Brand Welcome -->
      <section class="flex flex-col items-center text-center mb-8">
        <span class="text-6xl leading-none mb-4" aria-hidden="true">🏦</span>
        <h1 class="font-bold text-primary leading-tight mb-1" style="font-size: var(--font-size-2xl); color: var(--color-text-primary);">家庭积分银行</h1>
        <p class="text-sm font-medium mb-3" style="color: var(--color-text-muted); font-size: var(--font-size-sm);">FamilyPoints</p>
        <p class="text-base font-normal leading-relaxed" style="color: var(--color-text-secondary); font-size: var(--font-size-base);">每天进步一点点，积分攒起来！</p>
      </section>

      <!-- Middle Area — Role Selection Cards -->
      <section class="w-full flex flex-col gap-5" style="max-width: 400px;">

        <!-- Card A: Child Mode -->
        <div class="flex flex-col p-6 shadow-card" style="background-color: var(--color-card); border-radius: var(--radius-xl); border-left: 4px solid var(--color-income);">
          <div class="flex items-center gap-3 mb-3">
            <span class="text-4xl leading-none" aria-hidden="true">🧒</span>
            <div>
              <h2 class="font-bold leading-tight" style="font-size: var(--font-size-lg); color: var(--color-text-primary);">我是小朋友</h2>
              <p class="text-sm font-normal mt-0.5" style="color: var(--color-text-muted); font-size: var(--font-size-sm);">赚取积分，兑换快乐时光</p>
            </div>
          </div>
          <button data-dom-id="enter-child-earn" class="flex items-center justify-center w-full font-bold text-white transition-opacity active:opacity-80" style="min-height: var(--touch-min); background-color: var(--color-income); border-radius: var(--radius-full); font-size: var(--font-size-base); border: none; cursor: pointer;">
            进入我的银行 →
          </button>
        </div>

        <!-- Card B: Parent Mode -->
        <div class="flex flex-col p-6 shadow-card" style="background-color: var(--color-card); border-radius: var(--radius-xl); border-left: 4px solid var(--color-sky);">
          <div class="flex items-center gap-3 mb-3">
            <span class="text-4xl leading-none" aria-hidden="true">👨‍👩‍👧</span>
            <div>
              <h2 class="font-bold leading-tight" style="font-size: var(--font-size-lg); color: var(--color-text-primary);">我是家长</h2>
              <p class="text-sm font-normal mt-0.5" style="color: var(--color-text-muted); font-size: var(--font-size-sm);">管理规则，查看报表，结算利息</p>
            </div>
          </div>
          <button data-dom-id="enter-parent-earn" class="flex items-center justify-center w-full font-bold text-white transition-opacity active:opacity-80" style="min-height: var(--touch-min); background-color: var(--color-sky); border-radius: var(--radius-full); font-size: var(--font-size-base); border: none; cursor: pointer;">
            进入管理模式 →
          </button>
          <div class="flex items-center justify-center gap-1 mt-2">
            <span class="text-xs" aria-hidden="true">🔒</span>
            <span class="text-xs font-normal" style="color: var(--color-text-muted); font-size: var(--font-size-xs);">需要家长密码</span>
          </div>
        </div>

      </section>

      <!-- Bottom Area -->
      <footer class="mt-10 flex flex-col items-center gap-2">
        <div class="w-16 h-px" style="background-color: var(--color-border);"></div>
        <p class="text-xs font-normal" style="color: var(--color-text-muted); font-size: var(--font-size-xs);">V3.0</p>
      </footer>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
