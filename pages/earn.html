<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赚积分 - 家庭积分银行</title>
    <style id="theme-vars">
/* FamilyPoints - Brand CSS */
/* Core Concept: Growth Bank for kids */

:root {
  /* === Brand Colors === */
  --color-income: #2ECC71;
  --color-income-light: #A8E6CF;
  --color-income-dark: #27AE60;
  --color-expense: #FF6B6B;
  --color-expense-light: #FFB8B8;
  --color-expense-dark: #E55A5A;
  --color-background: #FFF9F0;
  --color-card: #FFFFFF;
  --color-cream: #FFEAA7;
  --color-sky: #74B9FF;
  --color-sky-light: #A8D8FF;
  --color-gold: #F9CA24;
  --color-gold-dark: #F0B90B;
  --color-text-primary: #2D3436;
  --color-text-secondary: #636E72;
  --color-text-muted: #B2BEC3;
  --color-border: #DFE6E9;
  --color-game-bg-start: #2D3436;
  --color-game-bg-end: #6C5CE7;
  --color-overlay: rgba(0, 0, 0, 0.4);

  /* === State Colors === */
  --state-success: #2ECC71;
  --state-warning: #FFEAA7;
  --state-error: #FF6B6B;
  --state-info: #74B9FF;

  /* === Typography === */
  --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  --font-size-xs: 12px;
  --font-size-sm: 14px;
  --font-size-base: 16px;
  --font-size-lg: 20px;
  --font-size-xl: 24px;
  --font-size-2xl: 32px;
  --font-size-3xl: 48px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-bold: 700;
  --font-weight-extra-bold: 800;
  --line-height-tight: 1.2;
  --line-height-normal: 1.5;

  /* === Spacing === */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* === Radius === */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* === Shadows === */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.12);

  /* === Touch Targets (child-friendly) === */
  --touch-min: 60px;
  --touch-min-height: 48px;

  /* === Layout === */
  --app-max-width: 800px;
  --header-height: 80px;
  --progress-bar-height: 60px;
  --tab-bar-height: 72px;
  --content-padding: 16px;
}

/* === Typography Classes === */
.text-xs { font-size: var(--font-size-xs); }
.text-sm { font-size: var(--font-size-sm); }
.text-base { font-size: var(--font-size-base); }
.text-lg { font-size: var(--font-size-lg); }
.text-xl { font-size: var(--font-size-xl); }
.text-2xl { font-size: var(--font-size-2xl); }
.text-3xl { font-size: var(--font-size-3xl); }

.font-normal { font-weight: var(--font-weight-normal); }
.font-medium { font-weight: var(--font-weight-medium); }
.font-bold { font-weight: var(--font-weight-bold); }
.font-extra-bold { font-weight: var(--font-weight-extra-bold); }

.text-primary { color: var(--color-text-primary); }
.text-secondary { color: var(--color-text-secondary); }
.text-muted { color: var(--color-text-muted); }
.text-income { color: var(--color-income); }
.text-expense { color: var(--color-expense); }
.text-gold { color: var(--color-gold-dark); }

/* === Utility Classes === */
.bg-background { background-color: var(--color-background); }
.bg-card { background-color: var(--color-card); }
.bg-income { background-color: var(--color-income); }
.bg-expense { background-color: var(--color-expense); }
.bg-cream { background-color: var(--color-cream); }
.bg-sky { background-color: var(--color-sky); }
.bg-gold { background-color: var(--color-gold); }

.rounded-sm { border-radius: var(--radius-sm); }
.rounded-md { border-radius: var(--radius-md); }
.rounded-lg { border-radius: var(--radius-lg); }
.rounded-xl { border-radius: var(--radius-xl); }
.rounded-full { border-radius: var(--radius-full); }

.shadow-card { box-shadow: var(--shadow-card); }
.shadow-card-hover { box-shadow: var(--shadow-card-hover); }
.shadow-float { box-shadow: var(--shadow-float); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-card: var(--color-card);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="mx-auto max-w-[var(--app-max-width)] pb-[calc(var(--tab-bar-height)+env(safe-area-inset-bottom,16px))]">
        <!-- ===== Top Header Bar ===== -->
        <header class="sticky top-0 z-30 flex items-center justify-between px-4 py-3" style="background-color: var(--color-background); min-height: var(--header-height);">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🏦</span>
                <span class="text-base font-bold truncate" style="color: var(--color-text-primary);">我的积分银行</span>
            </div>
            <div class="flex items-center gap-1.5">
                <span class="text-lg">🪙</span>
                <span class="text-2xl font-extra-bold" style="color: var(--color-gold-dark);">128</span>
            </div>
        </header>

        <!-- ===== Today's Progress Section ===== -->
        <section class="px-4 pb-3">
            <div class="rounded-xl p-3" style="background-color: var(--color-card); box-shadow: var(--shadow-card);">
                <!-- Earned progress -->
                <div class="mb-2.5">
                    <div class="flex items-center justify-between mb-1.5">
                        <span class="text-sm font-medium" style="color: var(--color-text-secondary);">今日已赚 ⭐️ 12 / 30</span>
                        <span class="text-xs font-medium" style="color: var(--color-income);">40%</span>
                    </div>
                    <div class="w-full h-2.5 rounded-full overflow-hidden" style="background-color: var(--color-income-light);">
                        <div class="h-full rounded-full" style="width: 40%; background-color: var(--color-income);"></div>
                    </div>
                </div>
                <!-- Spent progress -->
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <span class="text-sm font-medium" style="color: var(--color-text-secondary);">今日已花 💸 5 / 20</span>
                        <span class="text-xs font-medium" style="color: var(--color-expense);">25%</span>
                    </div>
                    <div class="w-full h-2.5 rounded-full overflow-hidden" style="background-color: var(--color-expense-light);">
                        <div class="h-full rounded-full" style="width: 25%; background-color: var(--color-expense);"></div>
                    </div>
                </div>
                <!-- Daily limit hint -->
                <p class="mt-2.5 text-xs text-center" style="color: var(--color-text-muted);">🎉 今日金币已装满，明天再来！</p>
            </div>
        </section>

        <!-- ===== Task Cards Grid ===== -->
        <section class="px-4">
            <div class="grid grid-cols-2 gap-3">
                <!-- Card 1: 叠被子 -->
                <button class="task-card relative flex flex-col items-center justify-center rounded-xl p-4 transition-transform duration-150 active:scale-[0.97] cursor-pointer" style="background-color: var(--color-card); box-shadow: var(--shadow-card); min-height: var(--touch-min);" data-dom-id="task-fold-bed">
                    <span class="text-5xl mb-2">🛏️</span>
                    <span class="text-base font-bold mb-1.5" style="color: var(--color-text-primary);">叠被子</span>
                    <span class="inline-flex items-center justify-center rounded-full px-2.5 py-0.5 text-sm font-bold" style="background-color: var(--color-income-light); color: var(--color-income-dark);">+2</span>
                </button>

                <!-- Card 2: 写作业 (with +1 button) -->
                <button class="task-card relative flex flex-col items-center justify-center rounded-xl p-4 transition-transform duration-150 active:scale-[0.97] cursor-pointer" style="background-color: var(--color-card); box-shadow: var(--shadow-card); min-height: var(--touch-min);" data-dom-id="task-homework">
                    <span class="text-5xl mb-2">📖</span>
                    <span class="text-base font-bold mb-1.5" style="color: var(--color-text-primary);">写作业</span>
                    <div class="flex items-center gap-2">
                        <span class="inline-flex items-center justify-center rounded-full px-2.5 py-0.5 text-sm font-bold" style="background-color: var(--color-income-light); color: var(--color-income-dark);">+3</span>
                        <span class="inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-bold transition-transform duration-150 active:scale-90" style="background-color: var(--color-income); color: var(--color-card);" data-dom-id="btn-homework-extra">+1</span>
                    </div>
                </button>

                <!-- Card 3: 游泳 -->
                <button class="task-card relative flex flex-col items-center justify-center rounded-xl p-4 transition-transform duration-150 active:scale-[0.97] cursor-pointer" style="background-color: var(--color-card); box-shadow: var(--shadow-card); min-height: var(--touch-min);" data-dom-id="task-swim">
                    <span class="text-5xl mb-2">🏊</span>
                    <span class="text-base font-bold mb-1.5" style="color: var(--color-text-primary);">游泳</span>
                    <span class="inline-flex items-center justify-center rounded-full px-2.5 py-0.5 text-sm font-bold" style="background-color: var(--color-income-light); color: var(--color-income-dark);">+5</span>
                </button>

                <!-- Card 4: 阅读 -->
                <button class="task-card relative flex flex-col items-center justify-center rounded-xl p-4 transition-transform duration-150 active:scale-[0.97] cursor-pointer" style="background-color: var(--color-card); box-shadow: var(--shadow-card); min-height: var(--touch-min);" data-dom-id="task-read">
                    <span class="text-5xl mb-2">📚</span>
                    <span class="text-base font-bold mb-1.5" style="color: var(--color-text-primary);">阅读</span>
                    <span class="inline-flex items-center justify-center rounded-full px-2.5 py-0.5 text-sm font-bold" style="background-color: var(--color-income-light); color: var(--color-income-dark);">+3</span>
                </button>

                <!-- Card 5: 做家务 (with sub-selection indicator) -->
                <button class="task-card relative flex flex-col items-center justify-center rounded-xl p-4 transition-transform duration-150 active:scale-[0.97] cursor-pointer" style="background-color: var(--color-card); box-shadow: var(--shadow-card); min-height: var(--touch-min);" data-dom-id="task-chores">
                    <span class="absolute top-2.5 right-2.5 text-xs" style="color: var(--color-text-muted);">▸</span>
                    <span class="text-5xl mb-2">🧹</span>
                    <span class="text-base font-bold mb-1.5" style="color: var(--color-text-primary);">做家务</span>
                    <span class="inline-flex items-center justify-center rounded-full px-2.5 py-0.5 text-sm font-bold" style="background-color: var(--color-income-light); color: var(--color-income-dark);">+3</span>
                </button>

                <!-- Card 6: 练琴 -->
                <button class="task-card relative flex flex-col items-center justify-center rounded-xl p-4 transition-transform duration-150 active:scale-[0.97] cursor-pointer" style="background-color: var(--color-card); box-shadow: var(--shadow-card); min-height: var(--touch-min);" data-dom-id="task-piano">
                    <span class="text-5xl mb-2">🎹</span>
                    <span class="text-base font-bold mb-1.5" style="color: var(--color-text-primary);">练琴</span>
                    <span class="inline-flex items-center justify-center rounded-full px-2.5 py-0.5 text-sm font-bold" style="background-color: var(--color-income-light); color: var(--color-income-dark);">+4</span>
                </button>

                <!-- Card 7: 喝水 -->
                <button class="task-card relative flex flex-col items-center justify-center rounded-xl p-4 transition-transform duration-150 active:scale-[0.97] cursor-pointer" style="background-color: var(--color-card); box-shadow: var(--shadow-card); min-height: var(--touch-min);" data-dom-id="task-water">
                    <span class="text-5xl mb-2">🥛</span>
                    <span class="text-base font-bold mb-1.5" style="color: var(--color-text-primary);">喝水</span>
                    <span class="inline-flex items-center justify-center rounded-full px-2.5 py-0.5 text-sm font-bold" style="background-color: var(--color-income-light); color: var(--color-income-dark);">+1</span>
                </button>

                <!-- Card 8: 早睡 -->
                <button class="task-card relative flex flex-col items-center justify-center rounded-xl p-4 transition-transform duration-150 active:scale-[0.97] cursor-pointer" style="background-color: var(--color-card); box-shadow: var(--shadow-card); min-height: var(--touch-min);" data-dom-id="task-early-sleep">
                    <span class="text-5xl mb-2">😴</span>
                    <span class="text-base font-bold mb-1.5" style="color: var(--color-text-primary);">早睡</span>
                    <span class="inline-flex items-center justify-center rounded-full px-2.5 py-0.5 text-sm font-bold" style="background-color: var(--color-income-light); color: var(--color-income-dark);">+2</span>
                </button>
            </div>
        </section>
    </main>

    <!-- ===== Bottom Tab Bar ===== -->
    <nav class="fixed bottom-0 left-0 right-0 z-40 mx-auto flex items-center justify-around border-t" style="max-width: var(--app-max-width); height: var(--tab-bar-height); background-color: var(--color-card); border-color: var(--color-border);" data-dom-id="bottom-tab-bar">
        <button class="flex flex-col items-center justify-center flex-1 h-full transition-colors duration-150" style="color: var(--color-income);" data-dom-id="tab-earn" data-tab-key="earn">
            <span class="text-xl mb-0.5">⭐️</span>
            <span class="text-xs font-bold">赚取</span>
        </button>
        <button class="flex flex-col items-center justify-center flex-1 h-full transition-colors duration-150" style="color: var(--color-text-muted);" data-dom-id="tab-spend" data-tab-key="spend">
            <span class="text-xl mb-0.5">🎮</span>
            <span class="text-xs font-medium">消费</span>
        </button>
        <button class="flex flex-col items-center justify-center flex-1 h-full transition-colors duration-150" style="color: var(--color-text-muted);" data-dom-id="tab-history" data-tab-key="history">
            <span class="text-xl mb-0.5">📋</span>
            <span class="text-xs font-medium">流水</span>
        </button>
        <button class="flex flex-col items-center justify-center flex-1 h-full transition-colors duration-150" style="color: var(--color-text-muted);" data-dom-id="tab-settings" data-tab-key="settings">
            <span class="text-xl mb-0.5">⚙️</span>
            <span class="text-xs font-medium">设置</span>
        </button>
    </nav>

    <!-- Safe area bottom spacer for fixed tab bar -->
    <div class="h-[env(safe-area-inset-bottom,0px)]" style="background-color: var(--color-card);"></div>

    <!-- ===== Custom Styles ===== -->
    <style>
        /* Task card hover effect */
        .task-card:hover {
            box-shadow: var(--shadow-card-hover);
        }

        /* Responsive: on wider screens, keep max-width centered */
        @media (min-width: 640px) {
            nav[data-dom-id="bottom-tab-bar"] {
                left: 50%;
                transform: translateX(-50%);
            }
        }

        /* Responsive grid upgrade for tablets */
        @media (min-width: 768px) {
            .grid-cols-2 {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
