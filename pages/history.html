<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流水账 - 家庭积分银行</title>
    <style id="theme-vars">
/* FamilyPoints - Brand CSS */
/* Core Concept: Growth Bank for kids */

:root {
  /* === Brand Colors === */
  --color-income: #2ECC71;
  --color-income-light: #A8E6CF;
  --color-income-dark: #27AE60;
  --color-expense: #FF6B6B;
  --color-expense-light: #FFB8B8;
  --color-expense-dark: #E55A5A;
  --color-background: #FFF9F0;
  --color-card: #FFFFFF;
  --color-cream: #FFEAA7;
  --color-sky: #74B9FF;
  --color-sky-light: #A8D8FF;
  --color-gold: #F9CA24;
  --color-gold-dark: #F0B90B;
  --color-text-primary: #2D3436;
  --color-text-secondary: #636E72;
  --color-text-muted: #B2BEC3;
  --color-border: #DFE6E9;
  --color-game-bg-start: #2D3436;
  --color-game-bg-end: #6C5CE7;
  --color-overlay: rgba(0, 0, 0, 0.4);

  /* === State Colors === */
  --state-success: #2ECC71;
  --state-warning: #FFEAA7;
  --state-error: #FF6B6B;
  --state-info: #74B9FF;

  /* === Typography === */
  --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  --font-size-xs: 12px;
  --font-size-sm: 14px;
  --font-size-base: 16px;
  --font-size-lg: 20px;
  --font-size-xl: 24px;
  --font-size-2xl: 32px;
  --font-size-3xl: 48px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-bold: 700;
  --font-weight-extra-bold: 800;
  --line-height-tight: 1.2;
  --line-height-normal: 1.5;

  /* === Spacing === */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* === Radius === */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* === Shadows === */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.12);

  /* === Touch Targets (child-friendly) === */
  --touch-min: 60px;
  --touch-min-height: 48px;

  /* === Layout === */
  --app-max-width: 800px;
  --header-height: 80px;
  --progress-bar-height: 60px;
  --tab-bar-height: 72px;
  --content-padding: 16px;
}

/* === Typography Classes === */
.text-xs { font-size: var(--font-size-xs); }
.text-sm { font-size: var(--font-size-sm); }
.text-base { font-size: var(--font-size-base); }
.text-lg { font-size: var(--font-size-lg); }
.text-xl { font-size: var(--font-size-xl); }
.text-2xl { font-size: var(--font-size-2xl); }
.text-3xl { font-size: var(--font-size-3xl); }

.font-normal { font-weight: var(--font-weight-normal); }
.font-medium { font-weight: var(--font-weight-medium); }
.font-bold { font-weight: var(--font-weight-bold); }
.font-extra-bold { font-weight: var(--font-weight-extra-bold); }

.text-primary { color: var(--color-text-primary); }
.text-secondary { color: var(--color-text-secondary); }
.text-muted { color: var(--color-text-muted); }
.text-income { color: var(--color-income); }
.text-expense { color: var(--color-expense); }
.text-gold { color: var(--color-gold-dark); }

/* === Utility Classes === */
.bg-background { background-color: var(--color-background); }
.bg-card { background-color: var(--color-card); }
.bg-income { background-color: var(--color-income); }
.bg-expense { background-color: var(--color-expense); }
.bg-cream { background-color: var(--color-cream); }
.bg-sky { background-color: var(--color-sky); }
.bg-gold { background-color: var(--color-gold); }

.rounded-sm { border-radius: var(--radius-sm); }
.rounded-md { border-radius: var(--radius-md); }
.rounded-lg { border-radius: var(--radius-lg); }
.rounded-xl { border-radius: var(--radius-xl); }
.rounded-full { border-radius: var(--radius-full); }

.shadow-card { box-shadow: var(--shadow-card); }
.shadow-card-hover { box-shadow: var(--shadow-card-hover); }
.shadow-float { box-shadow: var(--shadow-float); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-card: var(--color-card);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background-color: var(--color-background);">

    <!-- Top Header Bar (fixed) -->
    <header class="fixed top-0 left-0 right-0 z-40" style="background-color: var(--color-card); box-shadow: var(--shadow-card);">
        <div class="mx-auto flex items-center justify-between px-4" style="max-width: var(--app-max-width); height: var(--header-height);">
            <div class="flex items-center gap-2">
                <span class="text-xl">🏦</span>
                <span class="text-base font-bold truncate" style="color: var(--color-text-primary);">我的积分银行</span>
            </div>
            <div class="flex items-center gap-1 shrink-0">
                <span class="text-2xl font-bold" style="color: var(--color-gold-dark);">128</span>
                <span class="text-lg">🪙</span>
            </div>
        </div>
    </header>

    <!-- Spacer for fixed header -->
    <div style="height: var(--header-height);"></div>

    <main class="mx-auto px-4 pb-40" style="max-width: var(--app-max-width);">

        <!-- Today's Progress Section -->
        <section class="mb-4">
            <div class="rounded-lg p-3" style="background-color: var(--color-card); box-shadow: var(--shadow-card);">
                <!-- Earned progress -->
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-medium" style="color: var(--color-text-secondary);">今日已赚 ⭐️ 12 / 30</span>
                </div>
                <div class="w-full rounded-full mb-3" style="height: 8px; background-color: var(--color-income-light);">
                    <div class="rounded-full" style="width: 40%; height: 100%; background-color: var(--color-income);"></div>
                </div>
                <!-- Spent progress -->
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-medium" style="color: var(--color-text-secondary);">今日已花 💸 5 / 20</span>
                </div>
                <div class="w-full rounded-full" style="height: 8px; background-color: var(--color-expense-light);">
                    <div class="rounded-full" style="width: 25%; height: 100%; background-color: var(--color-expense);"></div>
                </div>
            </div>
        </section>

        <!-- Filter Pills -->
        <section class="mb-4">
            <div class="flex gap-2 overflow-x-auto no-scrollbar">
                <button class="shrink-0 px-4 py-1.5 text-sm font-medium rounded-full whitespace-nowrap" style="background-color: var(--color-sky); color: var(--color-card);">全部</button>
                <button class="shrink-0 px-4 py-1.5 text-sm font-medium rounded-full whitespace-nowrap" style="background-color: var(--color-card); color: var(--color-text-secondary); border: 1px solid var(--color-border);">只看出账</button>
                <button class="shrink-0 px-4 py-1.5 text-sm font-medium rounded-full whitespace-nowrap" style="background-color: var(--color-card); color: var(--color-text-secondary); border: 1px solid var(--color-border);">只看进账</button>
            </div>
        </section>

        <!-- Transaction List -->
        <section class="rounded-lg overflow-hidden" style="background-color: var(--color-card); box-shadow: var(--shadow-card);">

            <!-- Transaction Row 1 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">🏊</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">游泳</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">14:30</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-income);">+5</span>
            </div>

            <!-- Transaction Row 2 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">📖</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">写作业</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">13:00</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-income);">+3</span>
            </div>

            <!-- Transaction Row 3 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">📖</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">写作业</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">11:00</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-income);">+3</span>
            </div>

            <!-- Transaction Row 4 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">📱</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">看手机</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">10:30</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-expense);">-2</span>
            </div>

            <!-- Transaction Row 5 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">🛏️</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">叠被子</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">07:30</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-income);">+2</span>
            </div>

            <!-- Transaction Row 6 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">🍭</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">吃零食</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">16:00</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-expense);">-1</span>
            </div>

            <!-- Transaction Row 7 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">🧹</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">扫地</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">09:00</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-income);">+3</span>
            </div>

            <!-- Transaction Row 8 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">🎹</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">练琴</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">15:00</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-income);">+4</span>
            </div>

            <!-- Transaction Row 9 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">🥛</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">喝水</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">08:00</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-income);">+1</span>
            </div>

            <!-- Transaction Row 10 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">🚽</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">马桶盖没盖</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">12:00</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-expense);">-1</span>
            </div>

            <!-- Transaction Row 11 -->
            <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">😴</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">早睡</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">21:30</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-income);">+2</span>
            </div>

            <!-- Transaction Row 12 -->
            <div class="flex items-center justify-between px-4 py-3">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <span class="text-lg shrink-0">📚</span>
                    <span class="text-sm font-medium truncate" style="color: var(--color-text-primary);">阅读</span>
                </div>
                <span class="text-xs shrink-0 mx-3" style="color: var(--color-text-muted);">19:00</span>
                <span class="text-sm font-bold shrink-0" style="color: var(--color-income);">+3</span>
            </div>

        </section>

    </main>

    <!-- Floating Summary Card (fixed above tab bar) -->
    <div class="fixed left-0 right-0 z-30 px-4" style="bottom: var(--tab-bar-height);">
        <div class="mx-auto rounded-lg px-4 py-3 flex items-center gap-2" style="max-width: var(--app-max-width); background-color: var(--color-cream); box-shadow: var(--shadow-card);">
            <span class="text-base shrink-0">📅</span>
            <span class="text-sm font-medium" style="color: var(--color-text-primary);">本周利息结算倒计时：还剩 2 天</span>
        </div>
    </div>

    <!-- Bottom Tab Bar (fixed) -->
    <nav class="fixed bottom-0 left-0 right-0 z-40" style="background-color: var(--color-card); border-top: 1px solid var(--color-border); height: var(--tab-bar-height);">
        <div class="mx-auto flex items-center justify-around h-full" style="max-width: var(--app-max-width);">
            <a href="earn.html" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1" data-dom-id="tab-earn" data-tab-key="earn">
                <span class="text-lg">⭐️</span>
                <span class="text-xs" style="color: var(--color-text-muted);">赚取</span>
            </a>
            <a href="spend.html" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1" data-dom-id="tab-spend" data-tab-key="spend">
                <span class="text-lg">🎮</span>
                <span class="text-xs" style="color: var(--color-text-muted);">消费</span>
            </a>
            <a href="history.html" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1" data-dom-id="tab-history" data-tab-key="history">
                <span class="text-lg">📋</span>
                <span class="text-xs font-bold" style="color: var(--color-sky);">流水</span>
            </a>
            <a href="settings.html" class="flex flex-col items-center justify-center gap-0.5 min-w-0 flex-1" data-dom-id="tab-settings" data-tab-key="settings">
                <span class="text-lg">⚙️</span>
                <span class="text-xs" style="color: var(--color-text-muted);">设置</span>
            </a>
        </div>
    </nav>

    <script>lucide.createIcons();</script>
</body>
</html>
