<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孩子-赚积分 - 家庭积分银行</title>
    <style id="theme-vars">
/* FamilyPoints - Brand CSS */
/* Core Concept: Growth Bank for kids */

:root {
  /* === Brand Colors === */
  --color-income: #2ECC71;
  --color-income-light: #A8E6CF;
  --color-income-dark: #27AE60;
  --color-expense: #FF6B6B;
  --color-expense-light: #FFB8B8;
  --color-expense-dark: #E55A5A;
  --color-background: #FFF9F0;
  --color-card: #FFFFFF;
  --color-cream: #FFEAA7;
  --color-sky: #74B9FF;
  --color-sky-light: #A8D8FF;
  --color-gold: #F9CA24;
  --color-gold-dark: #F0B90B;
  --color-text-primary: #2D3436;
  --color-text-secondary: #636E72;
  --color-text-muted: #B2BEC3;
  --color-border: #DFE6E9;
  --color-game-bg-start: #2D3436;
  --color-game-bg-end: #6C5CE7;
  --color-overlay: rgba(0, 0, 0, 0.4);

  /* === State Colors === */
  --state-success: #2ECC71;
  --state-warning: #FFEAA7;
  --state-error: #FF6B6B;
  --state-info: #74B9FF;

  /* === Typography === */
  --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  --font-size-xs: 12px;
  --font-size-sm: 14px;
  --font-size-base: 16px;
  --font-size-lg: 20px;
  --font-size-xl: 24px;
  --font-size-2xl: 32px;
  --font-size-3xl: 48px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-bold: 700;
  --font-weight-extra-bold: 800;
  --line-height-tight: 1.2;
  --line-height-normal: 1.5;

  /* === Spacing === */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;

  /* === Radius === */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* === Shadows === */
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.12);

  /* === Touch Targets (child-friendly) === */
  --touch-min: 60px;
  --touch-min-height: 48px;

  /* === Layout === */
  --app-max-width: 800px;
  --header-height: 80px;
  --progress-bar-height: 60px;
  --tab-bar-height: 72px;
  --content-padding: 16px;
}

/* === Typography Classes === */
.text-xs { font-size: var(--font-size-xs); }
.text-sm { font-size: var(--font-size-sm); }
.text-base { font-size: var(--font-size-base); }
.text-lg { font-size: var(--font-size-lg); }
.text-xl { font-size: var(--font-size-xl); }
.text-2xl { font-size: var(--font-size-2xl); }
.text-3xl { font-size: var(--font-size-3xl); }

.font-normal { font-weight: var(--font-weight-normal); }
.font-medium { font-weight: var(--font-weight-medium); }
.font-bold { font-weight: var(--font-weight-bold); }
.font-extra-bold { font-weight: var(--font-weight-extra-bold); }

.text-primary { color: var(--color-text-primary); }
.text-secondary { color: var(--color-text-secondary); }
.text-muted { color: var(--color-text-muted); }
.text-income { color: var(--color-income); }
.text-expense { color: var(--color-expense); }
.text-gold { color: var(--color-gold-dark); }

/* === Utility Classes === */
.bg-background { background-color: var(--color-background); }
.bg-card { background-color: var(--color-card); }
.bg-income { background-color: var(--color-income); }
.bg-expense { background-color: var(--color-expense); }
.bg-cream { background-color: var(--color-cream); }
.bg-sky { background-color: var(--color-sky); }
.bg-gold { background-color: var(--color-gold); }

.rounded-sm { border-radius: var(--radius-sm); }
.rounded-md { border-radius: var(--radius-md); }
.rounded-lg { border-radius: var(--radius-lg); }
.rounded-xl { border-radius: var(--radius-xl); }
.rounded-full { border-radius: var(--radius-full); }

.shadow-card { box-shadow: var(--shadow-card); }
.shadow-card-hover { box-shadow: var(--shadow-card-hover); }
.shadow-float { box-shadow: var(--shadow-float); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--color-background);
    --color-card: var(--color-card);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-[calc(var(--tab-bar-height)+16px)] pt-[calc(var(--header-height)+8px)]" style="max-width:var(--app-max-width);margin:0 auto;">

        <!-- ====== Fixed Top Header Bar ====== -->
        <header class="fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-4" style="height:var(--header-height);max-width:var(--app-max-width);margin:0 auto;background:var(--color-card);box-shadow:var(--shadow-card);">
            <div class="flex items-center gap-2 min-w-0">
                <span class="text-xl whitespace-nowrap">🏦</span>
                <span class="text-sm font-bold truncate" style="color:var(--color-text-primary);">我的积分银行</span>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <span class="text-xl font-extra-bold whitespace-nowrap" style="color:var(--color-gold-dark);">128</span>
                <span class="text-lg">🪙</span>
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium whitespace-nowrap" style="background:var(--color-income-light);color:var(--color-income-dark);">👦 小明</span>
            </div>
        </header>

        <!-- ====== Today's Progress Section ====== -->
        <section class="mx-4 mb-4 p-3 rounded-lg" style="background:var(--color-card);box-shadow:var(--shadow-card);">
            <!-- Earned progress -->
            <div class="mb-3">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-sm font-medium" style="color:var(--color-text-primary);">今日已赚 ⭐️ 12 / 30</span>
                    <span class="text-xs font-medium" style="color:var(--color-income-dark);">40%</span>
                </div>
                <div class="w-full h-2.5 rounded-full overflow-hidden" style="background:var(--color-income-light);">
                    <div class="h-full rounded-full" style="width:40%;background:var(--color-income);"></div>
                </div>
            </div>
            <!-- Spent progress -->
            <div>
                <div class="flex items-center justify-between mb-1">
                    <span class="text-sm font-medium" style="color:var(--color-text-primary);">今日已花 💸 5 / 20</span>
                    <span class="text-xs font-medium" style="color:var(--color-expense-dark);">25%</span>
                </div>
                <div class="w-full h-2.5 rounded-full overflow-hidden" style="background:var(--color-expense-light);">
                    <div class="h-full rounded-full" style="width:25%;background:var(--color-expense);"></div>
                </div>
            </div>
        </section>

        <!-- ====== Task Card Grid ====== -->
        <section class="px-4">
            <div class="grid grid-cols-2 gap-3">

                <!-- Task: 叠被子 -->
                <div class="flex flex-col items-center justify-center p-3 rounded-lg cursor-pointer active:scale-95 transition-transform" style="background:var(--color-card);box-shadow:var(--shadow-card);min-height:var(--touch-min);" data-dom-id="task-make-bed">
                    <span class="text-2xl mb-1">🛏️</span>
                    <span class="text-sm font-medium truncate w-full text-center" style="color:var(--color-text-primary);">叠被子</span>
                    <span class="text-xs font-bold mt-1" style="color:var(--color-income);">+2</span>
                </div>

                <!-- Task: 写作业 (with +1 bonus button) -->
                <div class="flex flex-col items-center justify-center p-3 rounded-lg cursor-pointer active:scale-95 transition-transform" style="background:var(--color-card);box-shadow:var(--shadow-card);min-height:var(--touch-min);" data-dom-id="task-homework">
                    <span class="text-2xl mb-1">📖</span>
                    <span class="text-sm font-medium truncate w-full text-center" style="color:var(--color-text-primary);">写作业</span>
                    <div class="flex items-center gap-1 mt-1">
                        <span class="text-xs font-bold" style="color:var(--color-income);">+3</span>
                        <span class="inline-flex items-center justify-center w-5 h-5 rounded-full text-xs font-bold" style="background:var(--color-gold);color:var(--color-text-primary);font-size:10px;">+1</span>
                    </div>
                </div>

                <!-- Task: 游泳 -->
                <div class="flex flex-col items-center justify-center p-3 rounded-lg cursor-pointer active:scale-95 transition-transform" style="background:var(--color-card);box-shadow:var(--shadow-card);min-height:var(--touch-min);" data-dom-id="task-swimming">
                    <span class="text-2xl mb-1">🏊</span>
                    <span class="text-sm font-medium truncate w-full text-center" style="color:var(--color-text-primary);">游泳</span>
                    <span class="text-xs font-bold mt-1" style="color:var(--color-income);">+5</span>
                </div>

                <!-- Task: 阅读 -->
                <div class="flex flex-col items-center justify-center p-3 rounded-lg cursor-pointer active:scale-95 transition-transform" style="background:var(--color-card);box-shadow:var(--shadow-card);min-height:var(--touch-min);" data-dom-id="task-reading">
                    <span class="text-2xl mb-1">📚</span>
                    <span class="text-sm font-medium truncate w-full text-center" style="color:var(--color-text-primary);">阅读</span>
                    <span class="text-xs font-bold mt-1" style="color:var(--color-income);">+3</span>
                </div>

                <!-- Task: 做家务 (with sub-selection indicator) -->
                <div class="flex flex-col items-center justify-center p-3 rounded-lg cursor-pointer active:scale-95 transition-transform" style="background:var(--color-card);box-shadow:var(--shadow-card);min-height:var(--touch-min);" data-dom-id="task-chores">
                    <span class="text-2xl mb-1">🧹</span>
                    <span class="text-sm font-medium truncate w-full text-center" style="color:var(--color-text-primary);">做家务</span>
                    <div class="flex items-center gap-1 mt-1">
                        <span class="text-xs font-bold" style="color:var(--color-income);">+3</span>
                        <i data-lucide="chevron-down" class="w-3 h-3" style="color:var(--color-text-muted);"></i>
                    </div>
                </div>

                <!-- Task: 练琴 -->
                <div class="flex flex-col items-center justify-center p-3 rounded-lg cursor-pointer active:scale-95 transition-transform" style="background:var(--color-card);box-shadow:var(--shadow-card);min-height:var(--touch-min);" data-dom-id="task-piano">
                    <span class="text-2xl mb-1">🎹</span>
                    <span class="text-sm font-medium truncate w-full text-center" style="color:var(--color-text-primary);">练琴</span>
                    <span class="text-xs font-bold mt-1" style="color:var(--color-income);">+4</span>
                </div>

                <!-- Task: 喝水 -->
                <div class="flex flex-col items-center justify-center p-3 rounded-lg cursor-pointer active:scale-95 transition-transform" style="background:var(--color-card);box-shadow:var(--shadow-card);min-height:var(--touch-min);" data-dom-id="task-water">
                    <span class="text-2xl mb-1">🥛</span>
                    <span class="text-sm font-medium truncate w-full text-center" style="color:var(--color-text-primary);">喝水</span>
                    <span class="text-xs font-bold mt-1" style="color:var(--color-income);">+1</span>
                </div>

                <!-- Task: 早睡 -->
                <div class="flex flex-col items-center justify-center p-3 rounded-lg cursor-pointer active:scale-95 transition-transform" style="background:var(--color-card);box-shadow:var(--shadow-card);min-height:var(--touch-min);" data-dom-id="task-early-sleep">
                    <span class="text-2xl mb-1">😴</span>
                    <span class="text-sm font-medium truncate w-full text-center" style="color:var(--color-text-primary);">早睡</span>
                    <span class="text-xs font-bold mt-1" style="color:var(--color-income);">+2</span>
                </div>

            </div>
        </section>

    </main>

    <!-- ====== Fixed Bottom Tab Bar ====== -->
    <nav class="fixed bottom-0 left-0 right-0 z-40 flex items-start justify-around pt-2 border-t" style="height:var(--tab-bar-height);max-width:var(--app-max-width);margin:0 auto;background:var(--color-card);border-color:var(--color-border);">
        <!-- Tab: 赚取 (active) -->
        <a href="#" class="flex flex-col items-center gap-0.5 min-w-0" style="color:var(--color-income);" data-dom-id="tab-child-earn">
            <span class="text-xl">⭐️</span>
            <span class="text-xs font-medium whitespace-nowrap">赚取</span>
        </a>
        <!-- Tab: 消费 -->
        <a href="#" class="flex flex-col items-center gap-0.5 min-w-0" style="color:var(--color-text-muted);" data-dom-id="tab-child-spend">
            <span class="text-xl">🎮</span>
            <span class="text-xs font-medium whitespace-nowrap">消费</span>
        </a>
        <!-- Tab: 流水 -->
        <a href="#" class="flex flex-col items-center gap-0.5 min-w-0" style="color:var(--color-text-muted);" data-dom-id="tab-child-history">
            <span class="text-xl">📋</span>
            <span class="text-xs font-medium whitespace-nowrap">流水</span>
        </a>
        <!-- Locked: 家长专区 -->
        <div class="flex flex-col items-center gap-0.5 min-w-0 cursor-not-allowed" style="opacity:0.4;">
            <span class="text-xl">⚙️🔒</span>
            <span class="text-xs whitespace-nowrap" style="color:var(--color-text-muted);">家长专区</span>
        </div>
    </nav>
    <script>lucide.createIcons();</script>
</body>
</html>
